name: Deployment Status Workflow

on:
  push:
    branches: [ main ]

jobs:
  pre-deployment:
    name: pre-deployment
    runs-on: ubuntu-latest
    outputs:
      issue-number: ${{ steps.create-issue.outputs.issue-number }}
      previous-commit: ${{ steps.get-previous-commit.outputs.previous-commit }}
      current-commit: ${{ github.sha }}
      package-version: ${{ steps.get-package-version.outputs.package-version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Get previous commit

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint || echo "Lint check completed (warnings may exist)"

      - name: Run tests
        run: npm test

      - name: Get previous commit SHA
        id: get-previous-commit
        run: echo "previous-commit=$(git rev-parse HEAD~1)" >> $GITHUB_OUTPUT

      - name: Get package version
        id: get-package-version
        run: echo "package-version=$(jq -r '.version' package.json)" >> $GITHUB_OUTPUT

      - name: Create deployment tracking issue
        id: create-issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deployment Tracking - ${{ github.sha }}`,
              body: `Deployment in progress for commit ${{ github.sha }}`,
              labels: ['deployment', 'in-progress']
            });
            return issue.data.number;
          result-encoding: string

      - name: Post pre-deployment comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.create-issue.outputs.issue-number }},
              body: "Pre-deployment checks completed"
            });

  rollback-preparation:
    name: rollback-preparation
    runs-on: ubuntu-latest
    needs: pre-deployment
    outputs:
      artifact-name: ${{ steps.create-artifact.outputs.artifact-name }}
      checksum: ${{ steps.generate-checksum.outputs.checksum }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create rollback script
        run: |
          cat > rollback.sh << 'EOF'
          #!/bin/bash
          set -euo pipefail

          echo "Starting rollback process..."

          # Verify current commit
          CURRENT_COMMIT=$(git rev-parse HEAD)
          echo "Current commit: $CURRENT_COMMIT"

          # Rollback to previous commit
          echo "Rolling back to ${{ needs.pre-deployment.outputs.previous-commit }}..."
          git checkout ${{ needs.pre-deployment.outputs.previous-commit }}

          # Reinstall dependencies
          echo "Reinstalling dependencies..."
          npm ci

          # Verify rollback
          echo "Verifying rollback..."
          git log --oneline -2

          echo "Rollback completed successfully!"
          EOF
          chmod +x rollback.sh

      - name: Create configuration backups
        run: |
          mkdir -p rollback-backups
          cp package.json rollback-backups/
          cp package-lock.json rollback-backups/
          if [ -f .env.example ]; then cp .env.example rollback-backups/; fi

      - name: Create dependency verification script
        run: |
          cat > verify-dependencies.sh << 'EOF'
          #!/bin/bash
          set -euo pipefail

          echo "Verifying dependency compatibility..."
          npm audit --production
          echo "Dependency verification completed!"
          EOF
          chmod +x verify-dependencies.sh

      - name: Create rollback documentation
        run: |
          cat > ROLLBACK_GUIDE.md << 'EOF'
          # Rollback Guide

          ## Step-by-Step Rollback Instructions

          1. **Stop running application**
             ```bash
             pm2 stop all || pkill node
             ```

          2. **Run rollback script**
             ```bash
             ./rollback.sh
             ```

          3. **Verify rollback**
             ```bash
             git log --oneline -1
             npm run verify
             ```

          4. **Restart application**
             ```bash
             pm2 start app.js || node app.js
             ```

          5. **Monitor status**
             ```bash
             curl http://localhost:3000/health
             ```
          EOF

      - name: Create compressed rollback package
        id: create-artifact
        run: |
          ARTIFACT_NAME="rollback-package-${{ github.sha }}"
          tar -czf $ARTIFACT_NAME.tar.gz rollback.sh verify-dependencies.sh ROLLBACK_GUIDE.md rollback-backups/
          echo "artifact-name=$ARTIFACT_NAME" >> $GITHUB_OUTPUT

      - name: Generate SHA256 checksum
        id: generate-checksum
        run: |
          CHECKSUM=$(sha256sum ${{ steps.create-artifact.outputs.artifact-name }}.tar.gz | awk '{print $1}')
          echo "checksum=$CHECKSUM" >> $GITHUB_OUTPUT

      - name: Upload rollback artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.create-artifact.outputs.artifact-name }}
          path: ${{ steps.create-artifact.outputs.artifact-name }}.tar.gz
          retention-days: 30

      - name: Post rollback plan comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue-number }},
              body: `# 🔄 Rollback Plan Ready

              **Previous Commit: ${{ needs.pre-deployment.outputs.previous-commit }}**
              **Current Commit: ${{ needs.pre-deployment.outputs.current-commit }}**
              **Package Version: ${{ needs.pre-deployment.outputs.package-version }}**
              **Artifact: ${{ steps.create-artifact.outputs.artifact-name }}**

              ✅ Rollback script created
              ✅ Configuration backups completed
              ✅ Dependency verification script created
              ✅ Rollback documentation generated
              ✅ Compressed rollback package created

              ## Quick Rollback Command
              \`\`\`bash
              # Download artifact and extract
              gh run download ${{ github.run_id }} --name ${{ steps.create-artifact.outputs.artifact-name }}
              tar -xzf ${{ steps.create-artifact.outputs.artifact-name }}.tar.gz
              ./rollback.sh
              \`\`\`

              **Rollback script created: true**
              **Configuration backup: true**
              **SHA256: ${{ steps.generate-checksum.outputs.checksum }}**
              `
            });

  post-deployment:
    name: post-deployment
    runs-on: ubuntu-latest
    needs: rollback-preparation
    steps:
      - name: Update issue labels
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue-number }},
              name: 'in-progress'
            });
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue-number }},
              labels: ['completed']
            });

      - name: Post final deployment comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue-number }},
              body: `# Deployment Completed Successfully

              **Rollback Artifact Details:**
              - Artifact Name: ${{ needs.rollback-preparation.outputs.artifact-name }}
              - SHA256 Checksum: ${{ needs.rollback-preparation.outputs.checksum }}
              - Retention Period: 30 days

              Rollback package is available for download from this workflow run.`
            });

      - name: Close deployment issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue-number }},
              state: 'closed'
            });
